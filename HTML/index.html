<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Pro</title>

  <!-- GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- TAILWIND CONFIG -->
  <script src="tailwind.config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body class="font-[Poppins] text-white bg-lines">

<nav class="flex justify-between items-center px-10 py-6">
  <h1 class="text-xl font-bold text-teal-400">▲ Portfolio</h1>

  <div class="hidden md:flex gap-8 text-gray-300">

    <a href="#proyectos">Projects</a>

    </div>

    <div class="flex justify-center">
      <div class="relative">
        <div class="glow"></div>
        <div class="hex">
