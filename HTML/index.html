<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b1325', // Color de fondo oscuro similar a la imagen
                        accentBlue: '#2563eb', // Azul brillante para botones y texto
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0b1325;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Animación del cursor parpadeante */
        .cursor {
            display: inline-block;
            width: 4px;
            height: 1em;
            background-color: #2563eb;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Animación de elementos flotantes (para las esferas de la foto) */
        .float-anim {
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="antialiased">

    <nav class="flex justify-between items-center px-10 py-6 max-w-7xl mx-auto">
        <div class="text-xl font-bold flex items-center gap-2">
            <span class="bg-accentBlue text-white p-1 rounded">J</span> Martin Jara
        </div>
        <div class="hidden md:flex space-x-8 text-sm font-medium text-gray-300">
            <a href="#" class="hover:text-white border-b-2 border-accentBlue pb-1">Inicio</a>
            <a href="#" class="hover:text-white">Perfil</a>
            <a href="#" class="hover:text-white">Proyectos</a>
            <a href="#" class="hover:text-white">Servicios</a>
        </div>
        <button class="bg-accentBlue hover:bg-blue-700 text-white px-6 py-2 rounded-full text-sm font-semibold transition">
            Trabajemos Juntos
        </button>
    </nav>

    <header class="max-w-7xl mx-auto px-10 pt-16 pb-24 grid grid-cols-1 md:grid-cols-2 gap-10 items-center">
        
        <div>
            <p class="text-accentBlue tracking-widest text-sm font-semibold mb-2">Portafolio Web</p>
            <h1 class="text-5xl font-extrabold mb-2 leading-tight">
                Martín Jara <br>
                <span class="text-accentBlue" id="typewriter"></span><span class="cursor"></span>
            </h1>
            <p class="text-gray-400 mt-6 mb-8 text-sm leading-relaxed max-w-md">
                Yet bed any for travelling assistance indulgence unpleasing. Not thoughts all exercise blessing. Indulgence way everything joy alteration boisterous the attachment.
            </p>
            <div class="flex items-center gap-4">
                <button class="bg-accentBlue hover:bg-blue-700 text-white px-6 py-3 rounded-full text-sm font-semibold flex items-center gap-2 transition">
                    CONTACTO &rarr;
                </button>
                <div class="flex gap-3">
                    <a href="#" class="w-10 h-10 rounded-full border border-gray-600 flex items-center justify-center hover:bg-gray-800 transition"><span class="text-sm">f</span></a>
                    <a href="#" class="w-10 h-10 rounded-full border border-gray-600 flex items-center justify-center hover:bg-gray-800 transition text-pink-500"><span class="text-sm">ig</span></a>
                    <a href="#" class="w-10 h-10 rounded-full border border-gray-600 flex items-center justify-center hover:bg-gray-800 transition"><span class="text-sm">in</span></a>
                </div>
            </div>
        </div>

        <div class="relative flex justify-center">
            <div class="absolute inset-0 flex items-center justify-center opacity-20 -z-10">
                <div class="w-80 h-80 border-[1px] border-white rounded-full"></div>
                <div class="absolute w-72 h-72 border-[1px] border-white rounded-full"></div>
                <div class="absolute w-64 h-64 border-[1px] border-white rounded-full"></div>
            </div>
            
            <img src="https://via.placeholder.com/400x500/1a202c/ffffff?text=Tu+Foto+Aqui" alt="Foto" class="z-10 object-cover rounded-b-full">
            
            <div class="absolute top-10 left-10 w-12 h-12 bg-gradient-to-br from-gray-700 to-black rounded-full shadow-lg float-anim"></div>
            <div class="absolute bottom-20 right-0 w-16 h-16 bg-gradient-to-br from-blue-700 to-black rounded-full shadow-lg float-anim" style="animation-delay: 1s;"></div>
        </div>
    </header>

    <script>
        const textToType = "Desarrollador Full-Stack";
        const typingSpeed = 150; 
        let charIndex = 0;

        function typeWriter() {
            if (charIndex < textToType.length) {
                document.getElementById("typewriter").innerHTML += textToType.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, typingSpeed);
            }
        }

        // Iniciar la animación cuando cargue la página
        window.onload = typeWriter;
    </script>

</body>
</html>
